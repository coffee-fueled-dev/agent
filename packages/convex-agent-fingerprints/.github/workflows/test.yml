name: Test
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

jobs:
  check:
    name: Test and typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install and build
        run: |
          bun install
          bun run build
      - name: Publish package for testing branch
        run: bunx pkg-pr-new publish || echo "Have you set up pkg-pr-new for this repo?"
      - name: Test
        run: |
          bun run test
          bun run typecheck
